services:

  keycloak-db:
    image: postgres:17.7-alpine
    container_name: ai-career-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "5444:5432"
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    container_name: ai-career-keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak

      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin

      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "9090:8080"
    depends_on:
      - keycloak-db
    volumes:
      - ./docker/keycloak/realm:/opt/keycloak/data/import

  ai-interview-db:
    image: postgres:17.7-alpine
    container_name: ai-interview-db
    environment:
      POSTGRES_DB: ai-interview
      POSTGRES_USER: ai-interview
      POSTGRES_PASSWORD: ai-interview
    ports:
      - "5443:5432"
    volumes:
      - ai_interview_db_data:/var/lib/postgresql/data
volumes:
  keycloak_db_data:
  ai_interview_db_data: