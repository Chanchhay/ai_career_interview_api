spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost/realms/test
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:ai_interview_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: false
  ai:
    google:
      genai:
        api-key: test-key
        chat:
          model: test-model

keycloak:
  admin:
    server-url: http://localhost
    client-id: test-client
    realm: master
    target-realm: test
    client-secret: test-secret
